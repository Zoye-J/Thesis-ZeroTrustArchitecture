{% extends "base.html" %}

{% block title %}Loading Resources - Government ZTA System{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="text-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h3 class="mt-3">Loading Resource Portal...</h3>
        <p class="text-muted">Please wait while we verify your access</p>
    </div>
</div>

<script>
// This page loads the token from localStorage and redirects to /resources with the token
(function() {
    const token = localStorage.getItem('access_token');
    
    if (!token) {
        // No token, redirect to login
        window.location.href = '/login';
        return;
    }
    
    // Redirect to the actual resources page with token in header
    // We'll use fetch to load the page content
    fetch('/resources-content', {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(response => {
        if (response.status === 401) {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
            return;
        }
        return response.text();
    })
    .then(html => {
        // Replace current page with the loaded content
        document.open();
        document.write(html);
        document.close();
    })
    .catch(error => {
        console.error('Error loading resources:', error);
        document.body.innerHTML = `
            <div class="container mt-5">
                <div class="alert alert-danger">
                    <h4>Error Loading Resources</h4>
                    <p>${error.message}</p>
                    <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
                </div>
            </div>
        `;
    });
})();
</script>
{% endblock %}
