<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ZTA — Government Security System{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --navy:      #0f2444;
            --navy-mid:  #1a3a6b;
            --navy-soft: #e8edf5;
            --accent:    #1757c2;
            --accent-lt: #e4ecfb;
            --slate:     #374151;
            --slate-mid: #6b7280;
            --slate-lt:  #9ca3af;
            --divider:   #e5e7eb;
            --surface:   #f9fafb;
            --white:     #ffffff;
            --green:     #059669;
            --green-lt:  #d1fae5;
            --amber:     #d97706;
            --amber-lt:  #fef3c7;
            --red:       #dc2626;
            --red-lt:    #fee2e2;
            --purple:    #7c3aed;
            --purple-lt: #ede9fe;
            --shadow-sm: 0 1px 3px rgba(15,36,68,0.08), 0 1px 2px rgba(15,36,68,0.04);
            --shadow-md: 0 4px 12px rgba(15,36,68,0.10), 0 2px 6px rgba(15,36,68,0.06);
            --shadow-lg: 0 12px 32px rgba(15,36,68,0.12), 0 4px 12px rgba(15,36,68,0.08);
            --radius:    8px;
            --radius-lg: 12px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 400;
            background: var(--surface);
            color: var(--slate);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── TOPBAR ──────────────────────────────── */
        .zta-topbar {
            height: 4px;
            background: linear-gradient(90deg, var(--navy) 0%, var(--accent) 60%, #4f90f0 100%);
        }

        /* ─── NAV ─────────────────────────────────── */
        .zta-nav {
            background: var(--white);
            border-bottom: 1px solid var(--divider);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .zta-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand-shield {
            width: 32px;
            height: 32px;
            background: var(--navy);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-shield svg { width: 18px; height: 18px; fill: white; }

        .brand-text-wrap { line-height: 1.2; }

        .brand-name {
            font-family: 'IBM Plex Serif', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--navy);
            display: block;
            letter-spacing: -0.01em;
        }

        .brand-sub {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--slate-lt);
            display: block;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-link-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            color: var(--slate-mid);
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            border: none;
            background: none;
            cursor: pointer;
        }

        .nav-link-item:hover { background: var(--surface); color: var(--slate); }
        .nav-link-item.active { background: var(--accent-lt); color: var(--accent); }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px 5px 6px;
            border-radius: 20px;
            background: var(--navy-soft);
            font-size: 12px;
            font-weight: 500;
            color: var(--navy);
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--navy-mid);
            color: white;
            font-size: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-dept-badge {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--accent-lt);
            color: var(--accent);
            font-weight: 500;
        }

        .btn-logout {
            padding: 6px 14px;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 500;
            color: var(--slate-mid);
            border: 1px solid var(--divider);
            background: var(--white);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
        }

        .btn-logout:hover { background: var(--red-lt); border-color: #fca5a5; color: var(--red); }

        /* ─── PAGE WRAPPER ────────────────────────── */
        .zta-page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        .zta-page-sm {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* ─── CARDS ───────────────────────────────── */
        .card {
            background: var(--white);
            border: 1px solid var(--divider);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--divider);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h4, .card-header h5 {
            font-family: 'IBM Plex Serif', serif;
            font-weight: 600;
            color: var(--navy);
            margin: 0;
        }

        .card-body { padding: 20px; }

        /* ─── ENCRYPTION STATUS ───────────────────── */
        .encryption-status {
            padding: 8px 14px;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .encryption-active {
            background: var(--green-lt);
            color: var(--green);
            border: 1px solid #a7f3d0;
        }

        .encryption-inactive {
            background: var(--red-lt);
            color: var(--red);
            border: 1px solid #fca5a5;
        }

        /* ─── ALERTS ──────────────────────────────── */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border: 1px solid;
        }

        .alert-success { background: var(--green-lt); color: #065f46; border-color: #a7f3d0; }
        .alert-error, .alert-danger { background: var(--red-lt); color: #7f1d1d; border-color: #fca5a5; }
        .alert-info { background: var(--accent-lt); color: #1e3a8a; border-color: #bfdbfe; }
        .alert-warning { background: var(--amber-lt); color: #78350f; border-color: #fcd34d; }

        /* ─── BUTTONS ─────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            font-family: 'IBM Plex Sans', sans-serif;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid transparent;
            transition: all 0.15s;
            line-height: 1;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-primary:hover { background: #1348a8; border-color: #1348a8; color: white; }

        .btn-navy {
            background: var(--navy);
            color: white;
            border-color: var(--navy);
        }

        .btn-navy:hover { background: #0a1d36; border-color: #0a1d36; color: white; }

        .btn-secondary {
            background: var(--white);
            color: var(--slate);
            border-color: var(--divider);
        }

        .btn-secondary:hover { background: var(--surface); color: var(--slate); }

        .btn-danger {
            background: var(--red);
            color: white;
            border-color: var(--red);
        }

        .btn-danger:hover { background: #b91c1c; color: white; }

        .btn-lg { padding: 12px 24px; font-size: 14px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* ─── FORMS ───────────────────────────────── */
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--slate);
            margin-bottom: 6px;
            display: block;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--divider);
            border-radius: var(--radius);
            font-size: 13px;
            font-family: 'IBM Plex Sans', sans-serif;
            color: var(--slate);
            background: var(--white);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(23,87,194,0.10);
        }

        .form-control::placeholder { color: #d1d5db; }

        .form-text { font-size: 11px; color: var(--slate-lt); margin-top: 4px; }

        /* ─── BADGES ──────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-family: 'IBM Plex Mono', monospace;
        }

        .badge-navy { background: var(--navy-soft); color: var(--navy); }
        .badge-accent { background: var(--accent-lt); color: var(--accent); }
        .badge-green { background: var(--green-lt); color: var(--green); }
        .badge-amber { background: var(--amber-lt); color: var(--amber); }
        .badge-red { background: var(--red-lt); color: var(--red); }
        .badge-purple { background: var(--purple-lt); color: var(--purple); }

        /* ─── TYPOGRAPHY ──────────────────────────── */
        h1, h2, h3 {
            font-family: 'IBM Plex Serif', serif;
            color: var(--navy);
            line-height: 1.25;
        }

        h1 { font-size: 28px; font-weight: 600; }
        h2 { font-size: 22px; font-weight: 600; }
        h3 { font-size: 18px; font-weight: 600; }
        h4 { font-size: 15px; font-weight: 600; color: var(--navy); }
        h5 { font-size: 13px; font-weight: 600; color: var(--slate); }

        code, .mono {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            background: var(--surface);
            border: 1px solid var(--divider);
            padding: 1px 5px;
            border-radius: 3px;
            color: var(--accent);
        }

        /* ─── PAGE HEADER ─────────────────────────── */
        .page-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--divider);
        }

        .page-header-inner {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
        }

        .page-eyebrow {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 4px;
        }

        .page-title { margin-bottom: 4px; }
        .page-subtitle { font-size: 14px; color: var(--slate-mid); margin: 0; }

        /* ─── SECTION DIVIDER ─────────────────────── */
        .section-rule {
            border: none;
            border-top: 1px solid var(--divider);
            margin: 24px 0;
        }

        /* ─── TABLE ───────────────────────────────── */
        .table {
            font-size: 13px;
            border-collapse: collapse;
            width: 100%;
        }

        .table th {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--slate-lt);
            padding: 10px 14px;
            border-bottom: 1px solid var(--divider);
            background: var(--surface);
            font-family: 'IBM Plex Mono', monospace;
        }

        .table td {
            padding: 11px 14px;
            border-bottom: 1px solid var(--divider);
            color: var(--slate);
        }

        .table tbody tr:hover td { background: var(--surface); }
        .table tbody tr:last-child td { border-bottom: none; }

        /* ─── SPINNER ─────────────────────────────── */
        .zta-spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--divider);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── MISC UTILITIES ──────────────────────── */
        .text-navy { color: var(--navy); }
        .text-accent { color: var(--accent); }
        .text-muted { color: var(--slate-mid) !important; }
        .text-sm { font-size: 12px; }
        .text-xs { font-size: 11px; }
        .fw-500 { font-weight: 500; }
        .fw-600 { font-weight: 600; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }

        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 48px;
            color: var(--slate-mid);
            font-size: 13px;
        }

        /* ─── FADE IN ANIMATION ───────────────────── */
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── SCROLLBAR ───────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--slate-lt); }

        /* ─── RESPONSIVE ──────────────────────────── */
        @media (max-width: 768px) {
            .zta-nav { padding: 0 1rem; }
            .zta-page { padding: 20px 16px 32px; }
            .nav-links { display: none; }
        }

    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="zta-topbar"></div>

    <nav class="zta-nav">
        <a href="/dashboard" class="zta-brand">
            <div class="brand-shield">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4 6v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V6l-8-4z"/>
                </svg>
            </div>
            <div class="brand-text-wrap">
                <span class="brand-name">ZTA System</span>
                <span class="brand-sub">Bangladesh Government</span>
            </div>
        </a>

        <div class="nav-links" id="nav-links">
            <a href="/dashboard" class="nav-link-item" id="nav-dashboard">Dashboard</a>
            <a href="https://localhost:5002/audit/dashboard" target="_blank" class="nav-link-item" id="nav-audit">Audit</a>
        </div>

        <div class="nav-right">
            <div class="user-chip" id="userBadge" style="display:none">
                <div class="user-avatar" id="userAvatar">?</div>
                <span id="userName">User</span>
                <span class="user-dept-badge" id="userDept"></span>
            </div>
            <a href="/" class="btn-logout" id="homeBtn" onclick="logout()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                Sign Out
            </a>
        </div>
    </nav>

    <main id="mainContent" class="fade-in">
        {% block content %}{% endblock %}
    </main>

    <script>
    // Populate user chip from JWT token
    (function() {
        const token = localStorage.getItem('access_token');
        if (!token) return;
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const badge = document.getElementById('userBadge');
            const avatar = document.getElementById('userAvatar');
            const name = document.getElementById('userName');
            const dept = document.getElementById('userDept');
            if (badge) {
                badge.style.display = 'flex';
                if (avatar) avatar.textContent = (payload.username || 'U')[0].toUpperCase();
                if (name) name.textContent = payload.username || 'User';
                if (dept) dept.textContent = payload.department || '';
            }
        } catch(e) {}

        // Highlight active nav link
        const path = window.location.pathname;
        document.querySelectorAll('.nav-link-item').forEach(a => {
            if (a.getAttribute('href') && path.startsWith(a.getAttribute('href')) && a.getAttribute('href') !== '/') {
                a.classList.add('active');
            }
        });
    })();

    function logout() {
        localStorage.removeItem('access_token');
        window.location.href = '/';
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
