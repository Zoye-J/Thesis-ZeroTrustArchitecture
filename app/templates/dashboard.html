{% extends "base.html" %}

{% block title %}Dashboard — ZTA Government System{% endblock %}

{% block extra_css %}
<style>
    /* ─── DASHBOARD HEADER ──────────────────────── */
    .dashboard-header {
        margin-bottom: 32px;
    }

    .welcome-panel {
        background: var(--white);
        border: 1px solid var(--divider);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }

    .welcome-top {
        background: var(--navy);
        padding: 24px 28px;
        position: relative;
        overflow: hidden;
    }

    .welcome-top::after {
        content: '';
        position: absolute;
        bottom: -40px; right: -20px;
        width: 200px; height: 200px;
        border-radius: 50%;
        background: rgba(255,255,255,0.03);
    }

    .welcome-flag {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
    }

    .welcome-flag-line {
        height: 2px;
        width: 40px;
        background: rgba(255,255,255,0.2);
        border-radius: 1px;
    }

    .welcome-flag-text {
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.5);
        font-family: 'IBM Plex Mono', monospace;
    }

    .welcome-title {
        font-family: 'IBM Plex Serif', serif;
        font-size: 26px;
        font-weight: 600;
        color: white;
        margin-bottom: 6px;
        line-height: 1.2;
    }

    .welcome-sub {
        font-size: 13px;
        color: rgba(255,255,255,0.6);
    }

    /* ─── USER INFO GRID ────────────────────────── */
    .user-grid {
        padding: 24px 28px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
    }

    .user-info-item {
        border-right: 1px solid var(--divider);
        padding-right: 20px;
    }

    .user-info-item:last-child {
        border-right: none;
        padding-right: 0;
    }

    .info-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--slate-lt);
        font-family: 'IBM Plex Mono', monospace;
        margin-bottom: 6px;
    }

    .info-value {
        font-size: 15px;
        font-weight: 500;
        color: var(--navy);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* ─── CLEARANCE BADGES ─────────────────────── */
    .clearance-indicator {
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .clearance-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }

    .clearance-dot.BASIC { background: var(--green); }
    .clearance-dot.CONFIDENTIAL { background: var(--amber); }
    .clearance-dot.SECRET { background: var(--red); }
    .clearance-dot.TOP_SECRET { background: var(--purple); }

    .clearance-tag {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        border-radius: 4px;
        background: var(--surface);
        color: var(--slate);
        border: 1px solid var(--divider);
    }

    .clearance-tag.BASIC { border-color: var(--green); color: var(--green); background: var(--green-lt); }
    .clearance-tag.CONFIDENTIAL { border-color: var(--amber); color: #b45309; background: var(--amber-lt); }
    .clearance-tag.SECRET { border-color: var(--red); color: #b91c1c; background: var(--red-lt); }
    .clearance-tag.TOP_SECRET { border-color: var(--purple); color: #6d28d9; background: var(--purple-lt); }

    /* ─── ACTION CENTER ─────────────────────────── */
    .section-header {
        margin: 40px 0 24px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .section-header-line {
        height: 2px;
        width: 40px;
        background: var(--accent);
        border-radius: 1px;
    }

    .section-header h2 {
        font-family: 'IBM Plex Serif', serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--navy);
        margin: 0;
    }

    .action-grid {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto;
        max-width: 800px; /* Controls how wide the card can stretch */
    }

    .action-card {
        background: var(--white);
        border: 1px solid var(--divider);
        border-radius: var(--radius-lg);
        padding: 32px 28px; /* Slightly larger padding for a single card */
        transition: all 0.2s ease;
        box-shadow: var(--shadow-sm);
        width: 100%;
        max-width: 450px; /* Controls card width */
        text-align: center; /* Center all text inside */
    }

    .action-card:hover {
        transform: translateY(-2px);
        border-color: var(--accent-lt);
        box-shadow: var(--shadow-md);
    }

    /* Center the icon */
    .action-icon {
        width: 56px;
        height: 56px;
        background: var(--navy-soft);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto; /* Changed from margin-bottom to auto horizontal */
    }

    .action-icon svg {
        width: 28px;
        height: 28px;
        stroke: var(--navy);
        stroke-width: 1.8;
        fill: none;
    }

    /* Center the button */
    .action-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 24px;
        background: var(--navy); /* Make it more prominent */
        border: none;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        color: white;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
        font-family: 'IBM Plex Sans', sans-serif;
        margin: 0 auto; /* Center the button */
    }

    .action-button:hover {
        background: var(--accent);
        color: white;
    }

    .action-button svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
    }

    /* ─── ACTIVITY CARD (if needed) ─────────────── */
    .activity-preview {
        background: var(--white);
        border: 1px solid var(--divider);
        border-radius: var(--radius-lg);
        margin-top: 32px;
        padding: 20px 24px;
        box-shadow: var(--shadow-sm);
    }

    .activity-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }

    .activity-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--slate-lt);
        font-family: 'IBM Plex Mono', monospace;
    }

    .activity-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .activity-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--divider);
        font-size: 12px;
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-time {
        color: var(--slate-lt);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        min-width: 70px;
    }

    .activity-text {
        color: var(--slate);
    }

    /* ─── LOADING STATE ─────────────────────────── */
    .dashboard-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        background: var(--white);
        border: 1px solid var(--divider);
        border-radius: var(--radius-lg);
        gap: 16px;
    }

    .loading-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid var(--divider);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
        font-size: 13px;
        color: var(--slate-mid);
        font-family: 'IBM Plex Mono', monospace;
    }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 900px) {
        .user-grid { grid-template-columns: repeat(2, 1fr); }
        .user-info-item:nth-child(2) { border-right: none; }
        .action-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
        .user-grid { grid-template-columns: 1fr; }
        .user-info-item { border-right: none; border-bottom: 1px solid var(--divider); padding-bottom: 16px; margin-bottom: 8px; }
        .action-grid { grid-template-columns: 1fr; }
        .welcome-top { padding: 20px; }
        .welcome-title { font-size: 22px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="zta-page">
    <div id="dashboardContent" class="dashboard-loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading secure dashboard</div>
    </div>
</div>

<script>
async function loadDashboard() {
    try {
        const token = localStorage.getItem('access_token');
        
        if (!token) {
            window.location.href = '/';
            return;
        }
        
        // Get user info
        const userResponse = await fetch('/api/auth/me', {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        if (userResponse.status === 401) {
            localStorage.removeItem('access_token');
            window.location.href = '/';
            return;
        }
        
        if (!userResponse.ok) {
            throw new Error('Failed to get user info');
        }
        
        const userData = await userResponse.json();
        
        if (!userData.authenticated) {
            window.location.href = '/';
            return;
        }
        
        const user = userData.user;
        
        // Determine clearance class for dot and tag
        const clearanceClass = user.clearance_level?.toLowerCase().replace('_', '-') || 'basic';
        
        // Render dashboard
        document.getElementById('dashboardContent').innerHTML = `
            <div class="dashboard-header">
                <div class="welcome-panel">
                    <div class="welcome-top">
                        <div class="welcome-flag">
                            <div class="welcome-flag-line"></div>
                            <span class="welcome-flag-text">Bangladesh Government</span>
                            <div class="welcome-flag-line"></div>
                        </div>
                        <div class="welcome-title">Welcome, ${user.username}</div>
                        <div class="welcome-sub">Zero Trust Architecture — authenticated session</div>
                    </div>
                    
                    <div class="user-grid">
                        <div class="user-info-item">
                            <div class="info-label">Department</div>
                            <div class="info-value">${user.department || '—'}</div>
                        </div>
                        <div class="user-info-item">
                            <div class="info-label">Role / Class</div>
                            <div class="info-value">${user.user_class || 'user'}</div>
                        </div>
                        <div class="user-info-item">
                            <div class="info-label">Clearance</div>
                            <div class="info-value">
                                <div class="clearance-indicator">
                                    <span class="clearance-dot ${user.clearance_level}"></span>
                                    <span class="clearance-tag ${user.clearance_level}">${user.clearance_level}</span>
                                </div>
                            </div>
                        </div>
                        <div class="user-info-item">
                            <div class="info-label">Facility</div>
                            <div class="info-value">${user.facility || 'Headquarters'}</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="section-header">
                <div class="section-header"></div>
                <h2>Actions</h2>
                <div style="flex:1; height:1px; background:var(--divider);"></div>
            </div>
            
            <div class="action-grid">
                <div class="action-card">
                    <div class="action-icon">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <h3>Resource Portal</h3>
                    <p>Access classified documents and government resources based on your clearance level.</p>
                    <button onclick="accessResources()" class="action-button">
                        <span>Enter Portal</span>
                        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                </div>
                
                
                ${user.user_class === 'admin' || user.user_class === 'superadmin' ? `
                
                ` : `
            
                    
                `}
            </div>
            
        `;
        
    } catch (error) {
        console.error('Dashboard error:', error);
        document.getElementById('dashboardContent').innerHTML = `
            <div style="background: var(--red-lt); color: var(--red); padding: 24px; border-radius: var(--radius-lg); border: 1px solid #fca5a5;">
                <h3 style="font-family: 'IBM Plex Serif', serif; margin:0 0 10px 0;">Error Loading Dashboard</h3>
                <p style="font-size:13px; margin:0;">${error.message}</p>
                <button onclick="window.location.href='/'" style="margin-top:16px; padding:8px 18px; background:var(--white); border:1px solid var(--divider); border-radius:var(--radius); cursor:pointer;">
                    Return to Login
                </button>
            </div>
        `;
    }
}

// Action functions
function accessResources() {
    window.location.href = '/resources';
}



function manageUsers() {
    const token = localStorage.getItem('access_token');
    fetch('/api/users', {
        headers: {'Authorization': `Bearer ${token}`}
    })
    .then(response => {
        if (response.status === 403) {
            // Use a more elegant toast/notification system
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed; top:20px; right:20px; background:var(--red-lt); color:var(--red); padding:12px 20px; border-radius:8px; border:1px solid #fca5a5; font-size:13px; z-index:9999;';
            toast.textContent = 'Access Denied: Administrator privileges required';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        } else if (response.ok) {
            window.location.href = '/admin/users';
        }
    });
}

document.addEventListener('DOMContentLoaded', loadDashboard);

// Check token
window.addEventListener('load', function() {
    if (!localStorage.getItem('access_token')) {
        window.location.href = '/';
    }
});
</script>
{% endblock %}
