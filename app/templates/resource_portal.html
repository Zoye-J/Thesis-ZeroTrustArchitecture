{% extends "base.html" %}
{% block title %}Resource Portal — ZTA Government System{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/zta-encryption.js') }}"></script>
{% endblock %}

{% block extra_css %}
<style>
    .portal-banner {
        background: var(--navy);
        border-radius: var(--radius-lg);
        padding: 22px 28px;
        color: white;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        position: relative;
        overflow: hidden;
    }

    .portal-banner::before {
        content: '';
        position: absolute;
        top: -50px; right: -20px;
        width: 160px; height: 160px;
        border-radius: 50%;
        background: rgba(255,255,255,0.04);
    }

    .portal-banner-title {
        font-family: 'IBM Plex Serif', serif;
        font-size: 20px;
        font-weight: 600;
        color: white;
        margin-bottom: 4px;
    }

    .portal-banner-sub { font-size: 12px; color: rgba(255,255,255,0.5); }

    .portal-chips { display: flex; gap: 8px; flex-wrap: wrap; }

    .access-chip {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 20px;
        background: rgba(255,255,255,0.1);
        font-size: 11px;
        color: rgba(255,255,255,0.8);
        font-family: 'IBM Plex Mono', monospace;
    }

    .time-notice {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: var(--radius);
        background: var(--amber-lt);
        border: 1px solid #fcd34d;
        font-size: 12px;
        color: #78350f;
        margin-bottom: 20px;
    }

    .filter-bar {
        background: var(--white);
        border: 1px solid var(--divider);
        border-radius: var(--radius-lg);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .filter-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--slate-lt);
        font-family: 'IBM Plex Mono', monospace;
        white-space: nowrap;
    }

    .filter-tabs {
        display: flex;
        gap: 2px;
        background: var(--surface);
        border: 1px solid var(--divider);
        border-radius: 6px;
        padding: 2px;
    }

    .filter-tab {
        padding: 5px 12px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--slate-mid);
        transition: all 0.15s;
        white-space: nowrap;
    }

    .filter-tab.active { background: var(--white); color: var(--navy); box-shadow: var(--shadow-sm); }
    .filter-tab:hover:not(.active) { color: var(--slate); }

    .filter-search {
        flex: 1;
        min-width: 180px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border: 1px solid var(--divider);
        border-radius: var(--radius);
        background: var(--white);
        font-size: 13px;
        color: var(--slate-mid);
    }

    .filter-search input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 13px;
        font-family: 'IBM Plex Sans', sans-serif;
        color: var(--slate);
        background: transparent;
    }

    .filter-search input::placeholder { color: #d1d5db; }

    .results-meta {
        font-size: 12px;
        color: var(--slate-lt);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .results-count { font-weight: 600; color: var(--slate); }

    .resource-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 14px;
    }

    .resource-card {
        background: var(--white);
        border: 1px solid var(--divider);
        border-radius: var(--radius-lg);
        overflow: hidden;
        transition: box-shadow 0.2s, border-color 0.2s;
    }

    .resource-card:hover { box-shadow: var(--shadow-md); border-color: #e0e7ff; }

    .resource-card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 16px 16px 12px;
        gap: 10px;
    }

    .resource-card-title {
        font-family: 'IBM Plex Serif', serif;
        font-size: 14px;
        font-weight: 600;
        color: var(--navy);
        line-height: 1.35;
        margin: 0;
    }

    .tier-badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: 'IBM Plex Mono', monospace;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .tier-public { background: var(--green-lt); color: var(--green); }
    .tier-department { background: var(--accent-lt); color: var(--accent); }
    .tier-top_secret { background: var(--purple-lt); color: var(--purple); }

    .resource-card-meta {
        padding: 0 16px 12px;
    }

    .resource-meta-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--slate-mid);
        padding: 4px 0;
        border-bottom: 1px solid var(--divider);
    }

    .resource-meta-row:last-child { border-bottom: none; }
    .resource-meta-key { font-weight: 500; color: var(--slate-lt); font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
    .dept-match { color: var(--accent); font-weight: 500; }

    .resource-desc {
        padding: 0 16px 14px;
        font-size: 12px;
        color: var(--slate-mid);
        line-height: 1.5;
    }

    .resource-card-action { padding: 0 14px 14px; }

    .btn-access {
        width: 100%;
        padding: 9px;
        border-radius: var(--radius);
        font-size: 12px;
        font-weight: 600;
        font-family: 'IBM Plex Sans', sans-serif;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    .btn-access-open { background: var(--navy); color: white; }
    .btn-access-open:hover { background: #0a1d36; }
    .btn-access-denied { background: var(--surface); color: var(--slate-lt); border: 1px solid var(--divider); cursor: not-allowed; }
    .btn-access-time { background: var(--amber-lt); color: var(--amber); border: 1px solid #fcd34d; cursor: not-allowed; }

    .access-reason {
        margin: 8px 14px 14px;
        padding: 8px 10px;
        background: var(--surface);
        border-radius: var(--radius);
        font-size: 11px;
        color: var(--slate-lt);
        line-height: 1.4;
    }

    .empty-resources {
        text-align: center;
        padding: 60px 20px;
        background: var(--white);
        border: 1px solid var(--divider);
        border-radius: var(--radius-lg);
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
    .empty-title { font-family: 'IBM Plex Serif', serif; font-size: 16px; color: var(--navy); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: var(--slate-lt); margin-bottom: 16px; }

    /* ── MODAL ── */
    .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(15,36,68,0.6);
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fadeIn 0.2s ease;
    }

    .modal-box {
        background: var(--white);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 680px;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--divider);
        background: var(--navy);
    }

    .modal-head-title { font-family: 'IBM Plex Serif', serif; font-size: 16px; color: white; font-weight: 600; }
    .modal-head-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

    .modal-close {
        width: 30px; height: 30px;
        border-radius: 6px;
        background: rgba(255,255,255,0.1);
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.15s;
    }

    .modal-close:hover { background: rgba(255,255,255,0.2); }

    .modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
    }

    .modal-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 48px;
        color: var(--slate-mid);
        font-size: 13px;
    }

    .modal-field { margin-bottom: 14px; }
    .modal-field-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate-lt); font-family: 'IBM Plex Mono', monospace; margin-bottom: 4px; }
    .modal-field-value { font-size: 14px; color: var(--slate); }

    .modal-content-body {
        padding: 14px;
        background: var(--surface);
        border: 1px solid var(--divider);
        border-radius: var(--radius);
        font-size: 13px;
        color: var(--slate);
        line-height: 1.7;
        white-space: pre-wrap;
    }

    .zta-context-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--green-lt);
        border: 1px solid #a7f3d0;
        border-radius: var(--radius);
        font-size: 11px;
        color: #065f46;
        margin-top: 14px;
    }
</style>
{% endblock %}

{% block content %}
<div class="zta-page" id="resourcePortal">
    <div class="loading-state">
        <div class="zta-spinner"></div>
        Loading Resource Portal…
    </div>
</div>

<script>
let currentUser = null;
let resources = [];
let filters = { classification: 'all', search: '' };

async function loadResourcePortal() {
    let retries = 0;
    while (!window.ztaEncryptor && retries < 10) {
        await new Promise(r => setTimeout(r, 500));
        retries++;
    }

    if (!window.ztaEncryptor) {
        document.getElementById('resourcePortal').innerHTML =
            `<div class="alert alert-danger">Security module failed to load. <button onclick="location.reload()" class="btn btn-secondary btn-sm" style="margin-left:8px">Reload</button></div>`;
        return;
    }

    try { await window.ztaEncryptor.init(); } catch(e) {}

    const token = localStorage.getItem('access_token');
    if (!token) { window.location.href = '/'; return; }

    try {
        const me = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
        if (me.status === 401) { localStorage.removeItem('access_token'); window.location.href = '/'; return; }
        const meData = await me.json();
        if (!meData.authenticated) { window.location.href = '/'; return; }
        currentUser = meData.user;
    } catch(e) {
        document.getElementById('resourcePortal').innerHTML =
            `<div class="alert alert-danger">${e.message}</div>`; return;
    }

    await loadResources();
    renderPortal();
}

async function loadResources() {
    try {
        const token = localStorage.getItem('access_token');
        const res = await fetch('/api/resources', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) throw new Error('Failed to load resources');
        const data = await res.json();

        if (data.encrypted_payload) {
            if (window.ztaEncryptor?.initialized) {
                const dec = await window.ztaEncryptor.decryptFromAgent(data.encrypted_payload);
                resources = dec?.api_response?.data || [];
            }
        } else {
            resources = data.resources || data || [];
        }
    } catch(e) { resources = []; }
}

function renderPortal() {
    const cl = currentUser.clearance_level.toUpperCase();
    const showTS = currentUser.department === 'MOD' && (cl === 'SECRET' || cl === 'TOP_SECRET');
    const hour = new Date().getHours();
    const bizHours = hour >= 8 && hour < 16;
    const filtered = getFiltered();

    const clOptions = [
        { v:'all', l:'All' },
        { v:'PUBLIC', l:'Public' },
        { v:'DEPARTMENT', l:'Department' },
        ...(showTS ? [{ v:'TOP_SECRET', l:'Top Secret' }] : [])
    ];

    document.getElementById('resourcePortal').innerHTML = `
        <div class="page-header">
            <div class="page-header-inner">
                <div>
                    <div class="page-eyebrow">Resource Portal</div>
                    <h1 class="page-title">${currentUser.department} Document Library</h1>
                    <p class="page-subtitle">Access documents based on your clearance and department</p>
                </div>
                <div class="portal-chips">
                    <div class="portal-banner">
                        <div>
                            <div class="portal-banner-title">Secure Access</div>
                            <div class="portal-banner-sub">All requests are end-to-end encrypted</div>
                        </div>
                        <div class="portal-chips">
                            <div class="access-chip">◈ ${currentUser.clearance_level}</div>
                            <div class="access-chip">${currentUser.department}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        ${showTS && !bizHours ? `
        <div class="time-notice">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <strong>Outside Business Hours:</strong>&nbsp;TOP SECRET documents require access between 08:00–16:00. Current time: ${new Date().toLocaleTimeString()}.
        </div>
        ` : ''}

        <div class="filter-bar">
            <span class="filter-label">Filter</span>
            <div class="filter-tabs">
                ${clOptions.map(o => `<button class="filter-tab ${filters.classification===o.v?'active':''}" onclick="setFilter('${o.v}')">${o.l}</button>`).join('')}
            </div>
            <div class="filter-search">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Search by title or description…" oninput="setSearch(this.value)" value="${escapeHtml(filters.search)}">
            </div>
        </div>

        <div class="results-meta">
            <span class="results-count">${filtered.length}</span> resources found
            ${filters.classification !== 'all' ? `· <span>${clOptions.find(o=>o.v===filters.classification)?.l}</span>` : ''}
            ${filters.search ? `· matching "<strong>${escapeHtml(filters.search)}</strong>"` : ''}
        </div>

        ${filtered.length === 0
            ? `<div class="empty-resources">
                <div class="empty-icon">📂</div>
                <div class="empty-title">No resources found</div>
                <div class="empty-sub">Adjust your filters or check access permissions</div>
                <button onclick="resetFilters()" class="btn btn-secondary btn-sm">Reset Filters</button>
               </div>`
            : `<div class="resource-grid">${filtered.map(r => renderCard(r)).join('')}</div>`
        }
    `;
}

function renderCard(r) {
    const tierMap = { PUBLIC:['tier-public','PUBLIC'], DEPARTMENT:['tier-department','DEPT'], TOP_SECRET:['tier-top_secret','TOP SECRET'] };
    const [tierCls, tierLabel] = tierMap[r.tier] || tierMap.PUBLIC;
    const canAccess = checkAccess(r);
    const hour = new Date().getHours();
    const bizHours = hour >= 8 && hour < 16;
    const deptMatch = r.department === currentUser.department;

    let btnCls = 'btn-access-denied', btnLabel = '🔒 Restricted';
    if (canAccess && !(r.tier === 'TOP_SECRET' && !bizHours)) {
        btnCls = 'btn-access-open'; btnLabel = 'View Document';
    } else if (r.tier === 'TOP_SECRET' && !bizHours && canAccess) {
        btnCls = 'btn-access-time'; btnLabel = '⏱ Time Restricted';
    }
    const disabled = btnCls !== 'btn-access-open' ? 'disabled' : '';

    return `<div class="resource-card">
        <div class="resource-card-top">
            <h4 class="resource-card-title">${escapeHtml(r.name || r.title)}</h4>
            <span class="tier-badge ${tierCls}">${tierLabel}</span>
        </div>
        <div class="resource-desc">${escapeHtml(r.description || '')}</div>
        <div class="resource-card-meta">
            <div class="resource-meta-row">
                <span class="resource-meta-key">Department</span>
                <span class="${deptMatch ? 'dept-match' : ''}">${escapeHtml(r.department)}${deptMatch ? ' ✓' : ''}</span>
            </div>
            <div class="resource-meta-row">
                <span class="resource-meta-key">Classification</span>
                <span>${escapeHtml(r.tier)}</span>
            </div>
        </div>
        <div class="resource-card-action">
            <button class="btn-access ${btnCls}" onclick="requestAccess(${r.id}, event)" ${disabled}>
                ${btnLabel}
            </button>
            ${!canAccess || (r.tier === 'TOP_SECRET' && !bizHours) ? `<div class="access-reason">${escapeHtml(getDeniedReason(r))}</div>` : ''}
        </div>
    </div>`;
}

function checkAccess(r) {
    const cl = currentUser.clearance_level.toUpperCase();
    if (r.tier === 'PUBLIC') return true;
    if (r.tier === 'DEPARTMENT') return r.department === currentUser.department;
    if (r.tier === 'TOP_SECRET') {
        if (r.department !== 'MOD' || currentUser.department !== 'MOD') return false;
        if (cl !== 'SECRET' && cl !== 'TOP_SECRET') return false;
        const h = new Date().getHours(); return h >= 8 && h < 16;
    }
    return false;
}

function getDeniedReason(r) {
    const cl = currentUser.clearance_level.toUpperCase();
    if (r.tier === 'DEPARTMENT' && r.department !== currentUser.department)
        return `Department restricted — ${r.department} personnel only`;
    if (r.tier === 'TOP_SECRET') {
        if (currentUser.department !== 'MOD') return 'Requires MOD department assignment';
        if (cl !== 'SECRET' && cl !== 'TOP_SECRET') return `Requires SECRET clearance (current: ${currentUser.clearance_level})`;
        const h = new Date().getHours();
        if (h < 8 || h >= 16) return `Access permitted 08:00–16:00 only`;
    }
    return 'Access denied by security policy';
}

function getFiltered() {
    return resources.filter(r => {
        if (filters.classification !== 'all' && r.tier !== filters.classification) return false;
        if (filters.search) {
            const q = filters.search.toLowerCase();
            return (r.name||r.title||'').toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q);
        }
        return true;
    });
}

function setFilter(v) { filters.classification = v; renderPortal(); }
function setSearch(v) { filters.search = v; renderPortal(); }
function resetFilters() { filters = { classification:'all', search:'' }; renderPortal(); }

async function requestAccess(resourceId, evt) {
    const btn = evt.currentTarget;
    btn.textContent = '…'; btn.disabled = true;

    try {
        const token = localStorage.getItem('access_token');
        const res = await fetch(`/api/resources/${resourceId}/access`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ browser_public_key: window.ztaEncryptor?.userPublicKey || null })
        });

        if (!res.ok) {
            const err = await res.json();
            alert('Access denied: ' + (err.message || 'Unknown error'));
            btn.textContent = 'View Document'; btn.disabled = false; return;
        }

        const result = await res.json();
        if (result.encrypted_response) showModal(resourceId, result.encrypted_response);
        btn.textContent = 'View Document'; btn.disabled = false;
    } catch(e) {
        alert('Error: ' + e.message);
        btn.textContent = 'View Document'; btn.disabled = false;
    }
}

function showModal(resourceId, encryptedResponse) {
    document.getElementById('resourcePortal').insertAdjacentHTML('afterend', `
        <div class="modal-overlay" id="res-modal" onclick="closeModal(event)">
            <div class="modal-box" onclick="event.stopPropagation()">
                <div class="modal-head">
                    <div>
                        <div class="modal-head-title">Classified Document</div>
                        <div class="modal-head-sub">End-to-end encrypted via ZTA flow</div>
                    </div>
                    <button class="modal-close" onclick="document.getElementById('res-modal').remove()">✕</button>
                </div>
                <div class="modal-body" id="modal-body">
                    <div class="modal-loading">
                        <div class="zta-spinner"></div>
                        Decrypting response…
                    </div>
                </div>
            </div>
        </div>
    `);

    (async () => {
        try {
            if (!window.ztaEncryptor?.initialized) await window.ztaEncryptor.init();
            const dec = await window.ztaEncryptor.decryptFromAgent(encryptedResponse);
            if (!dec.allowed) throw new Error(dec.reason || 'Access denied');
            const rd = dec.api_response?.data || (dec.id ? dec : null);
            if (!rd) throw new Error('No resource data in response');

            document.getElementById('modal-body').innerHTML = `
                <div class="modal-field">
                    <div class="modal-field-label">Document</div>
                    <div class="modal-field-value" style="font-family:'IBM Plex Serif',serif;font-size:18px;font-weight:600;color:var(--navy)">${escapeHtml(rd.name||rd.title||'Document')}</div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
                    <div class="modal-field" style="margin:0">
                        <div class="modal-field-label">Department</div>
                        <div class="modal-field-value">${escapeHtml(rd.department||'—')}</div>
                    </div>
                    <div class="modal-field" style="margin:0">
                        <div class="modal-field-label">Classification</div>
                        <div class="modal-field-value">${escapeHtml(rd.tier||rd.classification||'—')}</div>
                    </div>
                </div>
                <div class="modal-field">
                    <div class="modal-field-label">Content</div>
                    <div class="modal-content-body">${escapeHtml(rd.content||'No content available')}</div>
                </div>
                <div class="zta-context-bar">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L4 6v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V6l-8-4z"/></svg>
                    ZTA verified · End-to-end encrypted · Trace: <code style="background:rgba(5,150,105,0.1);border-color:transparent">${escapeHtml(dec.request_id||'N/A')}</code>
                </div>
            `;
        } catch(e) {
            document.getElementById('modal-body').innerHTML = `
                <div class="alert alert-danger">
                    <strong>Access Denied</strong><br>${escapeHtml(e.message)}
                </div>
            `;
        }
    })();
}

function closeModal(e) {
    const m = document.getElementById('res-modal');
    if (m && e.target === m) m.remove();
}

function escapeHtml(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}
